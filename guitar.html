    <main>
        <h1 class="sr-only">Guitar</h1>
        <nav class="section-nav-card" aria-label="Tool navigation">
            <a class="section-nav-btn" href="guitar.html" aria-current="page"><span class="section-nav-icon" aria-hidden="true">🎸</span><span class="section-nav-label">Guitar</span></a>
            <a class="section-nav-btn" href="bass.html"><span class="section-nav-icon" aria-hidden="true">🎻</span><span class="section-nav-label">Bass</span></a>
            <a class="section-nav-btn" href="keyboard.html"><span class="section-nav-icon" aria-hidden="true">🎹</span><span class="section-nav-label">Keyboard</span></a>
            <a class="section-nav-btn" href="chord-builder.html"><span class="section-nav-icon" aria-hidden="true">🎵</span><span class="section-nav-label">Chord Builder</span></a>
            <a class="section-nav-btn" href="tools.html"><span class="section-nav-icon" aria-hidden="true">🧰</span><span class="section-nav-label">Other Tools</span></a>
        </nav>

        <div id="circle-of-fifths-mount"></div>

        <div class="tool-tabs" role="tablist">
            <button class="tool-tab" role="tab" aria-selected="true" data-panel="panel-scale">Scale Explorer</button>
            <button class="tool-tab" role="tab" aria-selected="false" data-panel="panel-caged">CAGED System</button>
            <button class="tool-tab" role="tab" aria-selected="false" data-panel="panel-chords">Chord Library</button>
            <button class="tool-tab" role="tab" aria-selected="false" data-panel="panel-capo">Capo Explorer</button>
        </div>

        <section id="panel-scale" class="tool-panel" role="tabpanel">
            <div class="controls-row">
                <div class="control-field">
                    <label for="scale-root">Root note</label>
                    <select id="scale-root"></select>
                </div>
                <div class="control-field">
                    <label for="scale-type">Scale</label>
                    <select id="scale-type"></select>
                </div>
            </div>
            <div class="scale-card">
                <div class="scale-card-label">Scale Notes</div>
                <div id="scale-chips" class="scale-pill-row"></div>
            </div>
            <div class="fretboard-panel">
                <div id="scale-fretboard"></div>
            </div>
        </section>

        <section id="panel-caged" class="tool-panel" role="tabpanel" hidden>
            <div class="controls-row">
                <div class="control-field">
                    <label for="caged-root">Root note</label>
                    <select id="caged-root"></select>
                </div>
            </div>
            <div id="caged-picker" class="caged-picker"></div>
            <p id="tool-note" class="tool-note"></p>
            <div class="fretboard-panel">
                <div id="caged-fretboard"></div>
            </div>
        </section>

        <section id="panel-chords" class="tool-panel" role="tabpanel" hidden>
            <div id="chord-lib-grid" class="chord-lib-grid"></div>
            <div class="fretboard-panel" style="margin-top:18px;">
                <div id="chord-lib-fretboard"></div>
            </div>
        </section>

        <section id="panel-capo" class="tool-panel" role="tabpanel" hidden>
            <div class="controls-row">
                <div class="control-field">
                    <label for="capo-open-chord">Chord shape you're playing</label>
                    <select id="capo-open-chord">
                        <option value="C">C shape</option>
                        <option value="A">A shape</option>
                        <option value="G">G shape</option>
                        <option value="D">D shape</option>
                        <option value="E">E shape</option>
                    </select>
                </div>
            </div>
            <p class="tool-note">Shows what chord actually sounds at each capo position, for the shape you're fretting.</p>
            <div id="capo-results" class="capo-result-grid"></div>
        </section>
    </main>
