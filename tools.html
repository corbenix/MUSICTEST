</head>

        </div>

    <main>
        <h1 class="sr-only">Other Tools</h1>
        <nav class="section-nav-card" aria-label="Tool navigation">
            <a class="section-nav-btn" href="guitar.html"><span class="section-nav-icon" aria-hidden="true">🎸</span><span class="section-nav-label">Guitar</span></a>
            <a class="section-nav-btn" href="bass.html"><span class="section-nav-icon" aria-hidden="true">🎻</span><span class="section-nav-label">Bass</span></a>
            <a class="section-nav-btn" href="keyboard.html"><span class="section-nav-icon" aria-hidden="true">🎹</span><span class="section-nav-label">Keyboard</span></a>
            <a class="section-nav-btn" href="chord-builder.html"><span class="section-nav-icon" aria-hidden="true">🎵</span><span class="section-nav-label">Chord Builder</span></a>
            <a class="section-nav-btn" href="tools.html" aria-current="page"><span class="section-nav-icon" aria-hidden="true">🧰</span><span class="section-nav-label">Other Tools</span></a>
        </nav>

        <div class="tool-tabs" role="tablist">
            <button class="tool-tab" role="tab" aria-selected="true" data-panel="panel-tuner">Tuner</button>
            <button class="tool-tab" role="tab" aria-selected="false" data-panel="panel-metro">Metronome</button>
        </div>

        <section id="panel-tuner" class="tool-panel" role="tabpanel">
            <div class="tuner-panel">
                <div id="tuner-note" class="tuner-note">—</div>
                <div id="tuner-cents" class="tuner-cents">0 cents</div>
                <div class="tuner-gauge"><div id="tuner-needle" class="tuner-needle"></div></div>
                <div id="tuner-status" class="tuner-status">Microphone off</div>
                <button id="tuner-start" type="button" class="tool-btn">Start Tuner</button>
            </div>
        </section>

        <section id="panel-metro" class="tool-panel" role="tabpanel" hidden>
            <div class="metro-panel">
                <div id="metro-dot" class="metro-dot"></div>
                <div class="metro-bpm-row">
                    <button id="metro-minus" type="button" class="metro-bpm-btn">−</button>
                    <div>
                        <div id="metro-bpm" class="metro-bpm-value">100</div>
                        <div class="metro-bpm-label">BPM</div>
                    </div>
                    <button id="metro-plus" type="button" class="metro-bpm-btn">+</button>
                </div>
                <button id="metro-toggle" type="button" class="tool-btn">Start</button>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <img src="assets/img/logo.png" alt="Chord Nexus logo" class="site-footer-logo" />

        <span class="site-footer-tagline">Connect. Learn. Create.</span>
